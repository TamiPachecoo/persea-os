<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>PERSEA — Protótipo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/theme.css">
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="cover-photo" style="background-image:url('shared/assets/nay-cover.jpg');"></div>
  <div class="cover-scrim"></div>
  <div class="ambient"></div>
  <div class="grain"></div>
  <div id="particles-mount"></div>
  <div class="max-w-md w-full px-6 text-center relative" style="z-index:1;">
    <p class="eyebrow mb-4">Sistema Operacional — Protótipo</p>
    <h1 class="font-serif mb-3" style="font-size:3rem; text-shadow:0 0 40px rgba(184,134,58,.35);">PERSEA</h1>
    <div class="divider mx-auto mb-6"></div>
    <p class="mb-10 text-sm" style="color:var(--muted); line-height:1.7;">Ainda sem backend conectado. Isso roda inteiramente com dados de exemplo no navegador, para você ver a experiência antes de conectarmos o Supabase.</p>
    <div class="space-y-3">
      <a href="client/dashboard.html" class="btn-primary block w-full text-center" style="padding-top:13px;padding-bottom:13px;">Continuar como Cliente</a>
      <a href="admin/dashboard.html" class="btn-ghost block w-full text-center" style="padding-top:12px;padding-bottom:12px;">Continuar como Admin</a>
    </div>
    <button id="reset-btn" class="btn-text mt-8 underline">Redefinir dados de exemplo</button>
  </div>
  <p class="fixed left-6 bottom-6 text-xs" style="z-index:1; color:var(--muted); letter-spacing:.05em;">NAY MURTA &nbsp;|&nbsp; MENTORIA PERSEA</p>
  <script type="module">
    import { MockDB } from './shared/mock-db.js';
    import { renderParticles } from './shared/ui.js';
    document.getElementById('particles-mount').innerHTML = renderParticles(14);
    document.getElementById('reset-btn').addEventListener('click', () => {
      MockDB.reset();
      alert('Dados de exemplo redefinidos.');
    });
  </script>
</body>
</html>
