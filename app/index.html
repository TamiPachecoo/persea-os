<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PERSEA — Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', system-ui, sans-serif; }
  .font-serif { font-family: 'Fraunces', serif; }
</style>
</head>
<body class="min-h-screen bg-[#0e0d0c] text-white/90 flex items-center justify-center">
  <div class="max-w-md w-full px-6 text-center">
    <p class="text-xs uppercase tracking-[0.3em] text-white/40 mb-3">Operating System — Prototype</p>
    <h1 class="text-4xl font-serif mb-2">PERSEA</h1>
    <p class="text-white/50 mb-10 text-sm">No backend wired up yet. This runs entirely on mock, in-browser data so you can see the experience before we connect Supabase.</p>
    <div class="space-y-3">
      <a href="client/dashboard.html" class="block w-full py-3 rounded-xl bg-white text-black font-medium hover:bg-white/90 transition-colors">Continue as Client</a>
      <a href="admin/dashboard.html" class="block w-full py-3 rounded-xl border border-white/20 hover:bg-white/5 transition-colors">Continue as Admin</a>
    </div>
    <button id="reset-btn" class="mt-8 text-xs text-white/30 hover:text-white/60 underline">Reset sample data</button>
  </div>
  <script type="module">
    import { MockDB } from './shared/mock-db.js';
    document.getElementById('reset-btn').addEventListener('click', () => {
      MockDB.reset();
      alert('Sample data reset to defaults.');
    });
  </script>
</body>
</html>
